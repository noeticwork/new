# Declarative secrets (cachix/secretspec). Docs: https://secretspec.dev
#
# This file alone doesn't wire anything into your dev shell — `nix flake
# init` only copies files, it can't patch an existing flake.nix. Two ways
# to actually get `secretspec` on PATH:
#
#   1. Static installer (always works, zero Nix packaging risk):
#        curl -sSL https://install.secretspec.dev | sh
#
#   2. As a flake input — NOT confirmed packaged in nixpkgs proper as of
#      writing (cachix/secretspec is devenv-built, not a plain flake with a
#      clear `packages` output). Verify first:
#        nix flake show github:cachix/secretspec
#      If that shows a `packages.<system>.default`, add to flake.nix inputs:
#        secretspec.url = "github:cachix/secretspec";
#      and to devShells.default.buildInputs:
#        inputs.secretspec.packages.${pkgs.system}.default
#
# Recipes worth pasting into your justfile once you're using this:
#
#   secrets-init:
#       secretspec init
#   secrets-check:
#       secretspec check
#   secrets-run *cmd:
#       secretspec run -- {{cmd}}

[project]
name = "my-project"
revision = "1.0"

[profiles.default]
# DATABASE_URL = { description = "PostgreSQL connection string", required = true }

[profiles.development]
# DATABASE_URL = { required = false, default = "sqlite://./dev.db" }

[profiles.production]
# DATABASE_URL = { required = true }
